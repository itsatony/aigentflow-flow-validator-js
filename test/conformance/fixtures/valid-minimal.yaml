aigentflow_version: '2.0.0'
name: minimal-greeting
version: '1.0.0'
description: A single-step flow that greets the caller.
start: greet
steps:
  greet:
    executor: function://text/template
    query:
      message: 'Hello, {{ .query.name | default "world" }}!'
    next:
      default: 'end'
query:
  name:
    type: string
    description: Who to greet.
output:
  - message
